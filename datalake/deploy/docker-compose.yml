# Стек для основного VPS: Dagster + Kafka.
# Flink уехал на второй VPS (см. docker-compose.flink.yml).
services:
  dagster:
    build:
      context: ../..        # корень репо — отсюда виден datalake/
      dockerfile: datalake/deploy/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../../.env
    volumes:
      - dagster_storage:/app/.dagster_home
    depends_on:
      - kafka

  kafka:
    image: apache/kafka:3.7.1
    restart: unless-stopped
    ports:
      - "9094:9094"           # внешний listener — Flink с VPS2 и локальные клиенты ходят сюда
    environment:
      # KRaft mode — без Zookeeper
      KAFKA_NODE_ID: "0"
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      # advertised: внутри docker-сети как kafka:9092, снаружи — по публичному адресу VPS
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:9094"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
      CLUSTER_ID: "mini-data-cluster-0"
    volumes:
      - kafka_data:/tmp/kraft-combined-logs

volumes:
  dagster_storage:
  kafka_data:
